# === ШАБЛОНЫ THYMELEAF ===
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true

# === БАЗА ДАННЫХ H2 (ФАЙЛОВАЯ) ===
# Данные сохраняются в папке ./data и не удаляются при перезапуске
spring.datasource.url=jdbc:h2:file:./data/family_budget;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate НЕ пересоздаёт таблицы, а обновляет схему и сохраняет данные
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# === ИНИЦИАЛИЗАЦИЯ ДАННЫХ ===
spring.sql.init.mode=never
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=false

# === H2 CONSOLE (для отладки, можно зайти по /h2-console) ===
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# === ЛОГИ И БЕЗОПАСНОСТЬ ===
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO